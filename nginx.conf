worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Inject Alphinium banner + ChatInstance widget into every HTML page
        sub_filter '</body>' '
    <div id="alphinium-banner" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;font-size:13px;padding:8px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.25)">
      <span>Built on <strong>Alphinium</strong> User Pods</span>
      <span style="opacity:.4;margin:0 4px">|</span>
      <a href="https://marketplace.alphinium.com" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:none;font-weight:700">Browse all demo apps</a>
      <span style="opacity:.4;margin:0 4px">|</span>
      <a href="https://app.alphinium.com/signup" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:none;font-weight:700">Build your own</a>
      <button onclick="this.parentElement.style.display=&quot;none&quot;" style="position:absolute;right:12px;background:none;border:none;color:#9ca3af;font-size:16px;cursor:pointer;padding:0 4px;line-height:1">x</button>
    </div>
    <!-- ChatInstance Widget -->
    <script>
      window.CHAT_CONFIG = {
        agent_id: "woofwalks",
        agent_name: "WoofWalks Assistant",
        ws_url: "wss://api.chatinstance.com/stream/ws"
      };
    </script>
    <script src="https://api.chatinstance.com/widget/popup-chat.js"></script>
  </body>';
        sub_filter_once on;

        location = /auth-popup {
            add_header Cache-Control "no-cache";
            try_files /auth-popup.html =404;
        }
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html { add_header Cache-Control "no-cache"; }
    }
}
