worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Inject ChatInstance widget into every HTML page
        sub_filter '</body>' '
    <!-- ChatInstance Widget -->
    <script>
      window.CHAT_CONFIG = {
        agent_id: "woofwalks-assistant-e1f89618",
        agent_name: "WoofWalks Assistant",
        ws_url: "wss://api.chatinstance.com/stream/ws"
      };
    </script>
    <script src="https://api.chatinstance.com/widget/popup-chat.js"></script>
  </body>';
        sub_filter_once on;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html { add_header Cache-Control "no-cache"; }
    }
}
